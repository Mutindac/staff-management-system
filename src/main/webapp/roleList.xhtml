<ui:composition template="template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:p="primefaces"
                xmlns:ui="jakarta.faces.facelets">

    <ui:define name="title">Role List - Staff Management</ui:define>

    <ui:define name="content">
        <p:card styleClass="premium-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 class="page-title" style="margin: 0;">Roles</h2>
                <h:form style="margin:0;">
                    <p:commandButton value="Add Role" action="#{roleBean.prepareAddRole}" oncomplete="PF('addRoleDialog').show()" update="addRoleForm" styleClass="btn-primary" icon="pi pi-plus" style="margin-top: 0 !important; padding: 5px 12px !important; font-size: 0.85rem !important;" />
                </h:form>
            </div>
            
            <h:form id="listForm">
                <p:dataTable id="roleTable" widgetVar="roleTable" value="#{roleBean.roleList}" var="s" paginator="true" rows="10" styleClass="ui-datatable-striped" emptyMessage="No roles found">
                    
                    <f:facet name="header">
                        <div style="display: flex; justify-content: flex-end; align-items: center; gap: 10px;">
                            <p:commandButton value="Export CSV" icon="pi pi-file-excel" styleClass="ui-button-success ui-button-outlined" ajax="false">
                                <p:dataExporter type="csv" target="roleTable" fileName="role_list"/>
                            </p:commandButton>
                            <p:commandButton value="Export PDF" icon="pi pi-file-pdf" styleClass="ui-button-danger ui-button-outlined" ajax="false">
                                <p:dataExporter type="pdf" target="roleTable" fileName="role_list"/>
                            </p:commandButton>
                            <span class="ui-input-icon-left">
                                <i class="pi pi-search" style="margin-left: 10px;"></i>
                                <p:inputText id="globalFilter" onkeyup="PF('roleTable').filter()" placeholder="    Type here to search..." style="width: 250px; border-radius: 20px; padding-left: 30px;"/>
                            </span>
                        </div>
                    </f:facet>

                    <p:column headerText="ID" width="80" sortBy="#{s.roleId}" filterBy="#{s.roleId}" filterMatchMode="contains">
                        <h:outputText value="#{s.roleId}" />
                    </p:column>
                    <p:column headerText="Title" sortBy="#{s.title}" filterBy="#{s.title}" filterMatchMode="contains">
                        <h:outputText value="#{s.title}" />
                    </p:column>
                    <p:column headerText="Description" sortBy="#{s.description}" filterBy="#{s.description}" filterMatchMode="contains">
                        <h:outputText value="#{s.description}" />
                    </p:column>
                    <p:column headerText="Actions" width="100" style="text-align: center;" exportable="false">
                        <p:commandButton icon="pi pi-pencil" styleClass="ui-button-rounded ui-button-info ui-button-flat" 
                                         action="#{roleBean.prepareUpdateRole(s)}" oncomplete="PF('updateRoleDialog').show()" update="updateRoleForm" style="margin-right: 5px;"/>
                    </p:column>
                </p:dataTable>
            </h:form>
        </p:card>

        <!-- Add Role Dialog -->
        <p:dialog header="Add Role" widgetVar="addRoleDialog" modal="true" showEffect="fade" hideEffect="fade" resizable="false" width="500">
            <h:form id="addRoleForm">
                <p:messages id="messages" showDetail="false" closable="true"><p:autoUpdate/></p:messages>
                
                <p:panelGrid columns="2" layout="grid" styleClass="ui-fluid form-grid" columnClasses="ui-grid-col-4, ui-grid-col-8"> 
                    <p:outputLabel for="title" value="Role Title"/>
                    <p:inputText id="title" value="#{roleBean.role.title}" required="true"/>
                    
                    <p:outputLabel for="description" value="Role Description"/>
                    <p:inputTextarea id="description" value="#{roleBean.role.description}" required="true" rows="3"/>
                </p:panelGrid>
                
                <div style="margin-top: 20px; text-align: right;">
                    <p:commandButton value="Cancel" type="button" styleClass="ui-button-secondary" onclick="PF('addRoleDialog').hide()" style="margin-right: 10px;" />
                    <p:commandButton value="Add Role" styleClass="btn-primary" action="#{roleBean.addRole(roleBean.role)}" update="listForm @form" oncomplete="if (!args.validationFailed) PF('addRoleDialog').hide()" icon="pi pi-id-card">
                        <p:resetInput target="addRoleForm" />
                    </p:commandButton>
                </div>
            </h:form>
        </p:dialog>
        
        <!-- Update Role Dialog -->
        <p:dialog header="Update Role" widgetVar="updateRoleDialog" modal="true" showEffect="fade" hideEffect="fade" resizable="false" width="500">
            <h:form id="updateRoleForm">
                <p:messages id="updateMessages" showDetail="false" closable="true"><p:autoUpdate/></p:messages>
                
                <p:panelGrid columns="2" layout="grid" styleClass="ui-fluid form-grid" columnClasses="ui-grid-col-4, ui-grid-col-8"> 
                    <p:outputLabel for="title" value="Role Title"/>
                    <p:inputText id="title" value="#{roleBean.role.title}" required="true" readonly="true"/>
                    
                    <p:outputLabel for="description" value="Role Description"/>
                    <p:inputTextarea id="description" value="#{roleBean.role.description}" required="true" rows="3"/>
                </p:panelGrid>
                
                <div style="margin-top: 20px; text-align: right;">
                    <p:commandButton value="Cancel" type="button" styleClass="ui-button-secondary" onclick="PF('updateRoleDialog').hide()" style="margin-right: 10px;" />
                    <p:commandButton value="Save Changes" styleClass="btn-primary" action="#{roleBean.updateRole(roleBean.role)}" update="listForm @form" oncomplete="if (!args.validationFailed) PF('updateRoleDialog').hide()" icon="pi pi-save" />
                </div>
            </h:form>
        </p:dialog>
        
        <!-- Script to auto-open dialog if directed from sidebar -->
        <h:outputScript>
            //<![CDATA[
            $(document).ready(function() {
                const urlParams = new URLSearchParams(window.location.search);
                if(urlParams.get('openAdd') === 'true') {
                    setTimeout(function() { PF('addRoleDialog').show(); }, 200);
                }
            });
            //]]>
        </h:outputScript>
    </ui:define>
</ui:composition>
