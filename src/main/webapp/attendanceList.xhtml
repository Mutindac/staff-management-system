<ui:composition template="template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:p="primefaces"
                xmlns:ui="jakarta.faces.facelets">

    <ui:define name="title">Attendance Logs - Staff Management</ui:define>

    <ui:define name="content">
        <h2 class="page-title">Attendance Logs</h2>
        
        <p:card styleClass="premium-card">
            <h:form id="attendanceForm">
                <p:messages id="messages" showDetail="true" closable="true">
                    <p:autoUpdate/>
                </p:messages>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
                    <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                        <p:outputLabel for="attendanceDate" value="Select Date:" style="font-weight: 600;" />
                        <p:datePicker id="attendanceDate" value="#{attendanceBean.selectedDate}" pattern="MMM dd, yyyy" showIcon="true">
                            <p:ajax event="dateSelect" listener="#{attendanceBean.loadAttendanceLogsForDate}" update="attendanceTable" />
                        </p:datePicker>
                        <p:commandButton value="Test Morning Emails" action="#{attendanceBean.testMorningReminders()}" update="@form" styleClass="ui-button-warning ui-button-outlined" />
                        <p:commandButton value="Test Evening Emails" action="#{attendanceBean.testEveningReminders()}" update="@form" styleClass="ui-button-warning ui-button-outlined" />
                    </div>
                    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                        <p:commandButton value="Export CSV" icon="pi pi-file-excel" styleClass="ui-button-success ui-button-outlined" ajax="false">
                            <p:dataExporter type="csv" target="attendanceTable" fileName="attendance_logs" />
                        </p:commandButton>
                        <p:commandButton value="Export PDF" icon="pi pi-file-pdf" styleClass="ui-button-danger ui-button-outlined" ajax="false">
                            <p:dataExporter type="pdf" target="attendanceTable" fileName="attendance_logs" />
                        </p:commandButton>
                    </div>
                </div>
                
                <p:dataTable id="attendanceTable" widgetVar="attendanceTable" value="#{attendanceBean.attendanceLogs}" var="log" paginator="true" rows="15" reflow="true" styleClass="ui-datatable-striped" emptyMessage="No attendance logs found">
                    <p:column headerText="Date" sortBy="#{log.workDate}" filterBy="#{log.workDate}" filterMatchMode="contains">
                        <h:outputText value="#{log.workDate}">
                            <f:convertDateTime pattern="MMM dd, yyyy" />
                        </h:outputText>
                    </p:column>
                    <p:column headerText="Staff Name" sortBy="#{attendanceBean.getStaffName(log.staffId)}" filterBy="#{attendanceBean.getStaffName(log.staffId)}" filterMatchMode="contains">
                        <h:outputText value="#{attendanceBean.getStaffName(log.staffId)}" />
                    </p:column>
                    <p:column headerText="Check In" sortBy="#{log.checkInTime}">
                        <h:outputText value="#{log.checkInTime}" rendered="#{not empty log.checkInTime}">
                            <f:convertDateTime pattern="hh:mm a" timeZone="Africa/Nairobi" />
                        </h:outputText>
                        <h:outputText value="Not Checked In" rendered="#{empty log.checkInTime}" style="color: #ef4444; font-weight: 300;" />
                    </p:column>
                    <p:column headerText="Check Out" sortBy="#{log.checkOutTime}">
                        <h:outputText value="#{log.checkOutTime}" rendered="#{not empty log.checkOutTime}">
                            <f:convertDateTime pattern="hh:mm a" timeZone="Africa/Nairobi" />
                        </h:outputText>
                        <h:outputText value="Not Checked Out" rendered="#{empty log.checkOutTime}" style="color: #ef4444; font-weight: 300;" />
                    </p:column>
                    <p:column headerText="Status" sortBy="#{log.status}" filterBy="#{log.status}" filterMatchMode="exact">
                        <f:facet name="filter">
                            <p:selectOneMenu onchange="PF('attendanceTable').filter()" styleClass="ui-custom-filter" style="width:100%">
                                <f:selectItem itemLabel="All" itemValue="#{null}" noSelectionOption="true" />
                                <f:selectItem itemLabel="PRESENT" itemValue="PRESENT" />
                                <f:selectItem itemLabel="ABSENT" itemValue="ABSENT" />
                            </p:selectOneMenu>
                        </f:facet>
                        <p:tag severity="#{log.status eq 'PRESENT' ? 'success' : 'danger'}" value="#{log.status}" />
                    </p:column>
                    <p:column headerText="Actions" style="width: 80px; text-align: center;" exportable="false">
                        <p:commandButton icon="pi pi-pencil"
                                         styleClass="ui-button-rounded ui-button-warning ui-button-flat"
                                         title="Edit Attendance"
                                         disabled="#{log.attendanceId == 0}"
                                         action="#{attendanceBean.prepareEdit(log)}"
                                         update=":editAttendanceDialog"
                                         oncomplete="PF('editAttendanceDlg').show()" />
                    </p:column>
                </p:dataTable>
            </h:form>
        </p:card>

        <!-- Edit Attendance Dialog -->
        <p:dialog id="editAttendanceDialog" widgetVar="editAttendanceDlg" header="Edit Attendance Record"
                  modal="true" responsive="true" fitViewport="true"
                  width="420" resizable="false" showEffect="fade" hideEffect="fade">
            <h:form id="editAttendanceForm">
                <div class="p-fluid" style="padding: 10px;">
                    <div style="margin-bottom: 15px;">
                        <p:outputLabel value="Staff" style="font-weight: 600; display: block; margin-bottom: 6px;" />
                        <p:inputText value="#{attendanceBean.getStaffName(attendanceBean.selectedAttendance.staffId)}"
                                     readonly="true" style="background: #f8fafc;" />
                    </div>
                    <div style="margin-bottom: 15px;">
                        <p:outputLabel value="Date" style="font-weight: 600; display: block; margin-bottom: 6px;" />
                        <h:outputText value="#{attendanceBean.selectedAttendance.workDate}" style="font-weight: 500;">
                            <f:convertDateTime pattern="MMM dd, yyyy" />
                        </h:outputText>
                    </div>
                    <div style="margin-bottom: 15px;">
                        <p:outputLabel for="editCheckIn" value="Check-In Time" style="font-weight: 600; display: block; margin-bottom: 6px;" />
                        <p:datePicker id="editCheckIn" value="#{attendanceBean.editCheckIn}"
                                      timeOnly="true" pattern="HH:mm" showIcon="true" style="width: 100%;" />
                    </div>
                    <div style="margin-bottom: 15px;">
                        <p:outputLabel for="editCheckOut" value="Check-Out Time" style="font-weight: 600; display: block; margin-bottom: 6px;" />
                        <p:datePicker id="editCheckOut" value="#{attendanceBean.editCheckOut}"
                                      timeOnly="true" pattern="HH:mm" showIcon="true" style="width: 100%;" />
                    </div>
                    <div style="margin-bottom: 20px;">
                        <p:outputLabel for="editStatus" value="Status" style="font-weight: 600; display: block; margin-bottom: 6px;" />
                        <p:selectOneMenu id="editStatus" value="#{attendanceBean.editStatus}" style="width: 100%;">
                            <f:selectItem itemLabel="PRESENT" itemValue="PRESENT" />
                            <f:selectItem itemLabel="ABSENT" itemValue="ABSENT" />
                        </p:selectOneMenu>
                    </div>
                    <div style="display: flex; justify-content: flex-end; gap: 10px;">
                        <p:commandButton value="Cancel" type="button" onclick="PF('editAttendanceDlg').hide();"
                                         styleClass="ui-button-secondary ui-button-flat" style="border-radius: 8px;" />
                        <p:commandButton value="Save Changes" icon="pi pi-check"
                                         action="#{attendanceBean.saveAttendanceEdit}"
                                         update=":attendanceForm:attendanceTable :attendanceForm:messages"
                                         oncomplete="if (!args.validationFailed) PF('editAttendanceDlg').hide();"
                                         styleClass="ui-button-success" style="border-radius: 8px;" />
                    </div>
                </div>
            </h:form>
        </p:dialog>
    </ui:define>
</ui:composition>
