<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="primefaces"
      xmlns:f="jakarta.faces.core">

<h:head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login</title>
    <style>
        body {
            background-color: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        }
        .login-card {
            width: 100%;
            max-width: 330px;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 12px;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 5px;
            margin: 0 15px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 25px;
        }
        .login-header h2 {
            margin: 0;
            color: #1a1a2e;
            font-size: 24px;
            font-weight: 700;
        }
        .login-header p {
            color: #555;
            margin-top: 5px;
            font-size: 14px;
        }
        .ui-float-label {
            margin-top: 15px;
        }
        .login-button {
            width: 100%;
            margin-top: 20px !important;
            border-radius: 4px !important;
            padding: 6px 0 !important;
            font-size: 13px !important;
            font-weight: 600 !important;
            background: linear-gradient(180deg, #1b329c 0%, #0000a2 100%) !important;
            border: 1px solid #000066 !important;
            border-bottom: 2px solid #000055 !important;
            color: white !important;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 1px 2px rgba(0,0,0,0.2) !important;
            text-shadow: 0 -1px 0 rgba(0,0,0,0.3) !important;
            transition: all 0.1s ease !important;
        }
        .login-button:hover {
            background: linear-gradient(180deg, #2540b0 0%, #000080 100%) !important;
        }
        .login-button:active {
            background: #000080 !important;
            border-bottom-width: 1px !important;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4) !important;
            transform: translateY(1px);
        }
        .ui-messages {
            margin-bottom: 20px;
        }
    </style>
</h:head>
<h:body>
    <p:card styleClass="login-card">
        <div class="login-header">
            <img src="https://mspace.co.ke/img/new-mspace-logo.jpeg" alt="MSpace Logo" style="max-width: 160px; margin-bottom: 10px;" />
            <h2 style="font-size: 20px;">Staff Management</h2>
            <p style="font-size: 12px;">System Login</p>
        </div>
        
        <h:form id="loginForm">
            <p:messages id="messages" showDetail="false" closable="true">
                <p:autoUpdate/>
            </p:messages>
            
            <div class="ui-fluid">
                <div class="p-field" style="margin-bottom: 0.8rem;">
                    <p:outputLabel for="username" value="Username" style="font-weight: 600; margin-bottom: 3px; display: block; font-size: 13px;"/>
                    <p:inputText id="username" value="#{loginBean.username}" required="true" requiredMessage="Username is required" style="padding: 6px 8px; border-radius: 3px; border: 1px solid #ccc; width: 100%;" />
                </div>
                
                <div class="p-field" style="margin-bottom: 0.8rem;">
                    <p:outputLabel for="password" value="Password" style="font-weight: 600; margin-bottom: 3px; display: block; font-size: 13px;"/>
                    <p:password id="password" value="#{loginBean.password}" required="true" requiredMessage="Password is required" style="padding: 6px 8px; border-radius: 3px; border: 1px solid #ccc; width: 100%;" />
                </div>
            </div>
            
            <p:commandButton value="Secure Login" action="#{loginBean.login}" styleClass="ui-button-primary login-button" update="@form" />
        </h:form>
    </p:card>
    
    <div style="position: absolute; bottom: 20px; text-align: center; color: #a0aec0; font-size: 13px; width: 100%;">
        Staff Management System © <span id="year"></span> Mspace. All rights reserved.
    </div>
    <script>
        document.getElementById("year").textContent = new Date().getFullYear();
    </script>
</h:body>
</html>
